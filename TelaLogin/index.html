<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Muriaço Brasil</title>
</head>

<body>

    <div class="container">

        <div class="imgMuriaco">
            <img src="../assets/images/muriaco2.png" alt="Logo da empresa Muriaço">
        </div>

        <div class="login">
            <div class="menulogin">
                <h2>Login</h2>

                <form id="loginForm">
                    <input type="text" id="usuario" placeholder="Usuário" required>
                    <input type="password" id="senha" placeholder="Senha" required>

                    <button type="submit">Entrar</button>
                </form>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
